num_proc: 1
cache_dir: cache/       # Usually for raw and processed data
wandb_project: genrec-memorization-and-generalization
log_dir: logs/
tensorboard_log_dir: tensorboard/
ckpt_dir: ckpt/
run_id: genrec_default  # Change this to your customized run id
rand_seed: 2024
reproducibility: True
logging: True

train_batch_size: 256
eval_batch_size: 128
lr: 0.0003             # Note that TIGER will overwrite this to 0.003
weight_decay: 0.0
warmup_steps: 10000
steps: ~
epochs: 300             # Make sure model fully converges
max_grad_norm: 1.0      # None for no clipping, else a float value
eval_interval: 2        # Evaluate every n epochs
patience: 20            # Early stopping. Stop training after n epochs without improvement. Set to None to disable

topk: [5,10]
metrics: [ndcg,recall,err]
val_metric: ndcg@10

# Fine-grained evaluation
eval_fine_grained: True     # Enable fine-grained evaluation during training
fine_grained_metric: ndcg@10 # Metric to use for fine-grained evaluation
max_hop: 4                   # Maximum hop for fine-grained patterns
exclusive_labels: True      # Whether to only label the smallest hop where it becomes true
